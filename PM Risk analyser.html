<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PM Risk Radar</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3a;
    --accent: #ff4d6d;
    --accent2: #ffd166;
    --accent3: #06d6a0;
    --text: #e8e8f0;
    --muted: #6b6b85;
    --danger: #ff4d6d;
    --warn: #ffd166;
    --safe: #06d6a0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(255,77,109,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,77,109,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 24px;
    position: relative;
    z-index: 1;
  }

  header {
    margin-bottom: 48px;
  }

  .badge {
    display: inline-block;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 4px 12px;
    margin-bottom: 16px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(32px, 5vw, 52px);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -1px;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    margin-top: 12px;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.6;
  }

  /* Input area */
  .input-section {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 24px;
    margin-bottom: 32px;
    position: relative;
  }

  .input-section::before {
    content: 'SITUATION INPUT';
    position: absolute;
    top: -1px;
    left: 24px;
    transform: translateY(-50%);
    background: var(--surface);
    padding: 0 8px;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--accent);
  }

  textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    line-height: 1.7;
    padding: 16px;
    resize: vertical;
    min-height: 140px;
    outline: none;
    transition: border-color 0.2s;
  }

  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }

  .input-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 16px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .examples {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .example-chip {
    font-size: 11px;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 4px 10px;
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
    font-family: 'DM Mono', monospace;
  }

  .example-chip:hover {
    color: var(--accent2);
    border-color: var(--accent2);
  }

  .scan-btn {
    background: var(--accent);
    color: white;
    border: none;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 1px;
    padding: 12px 28px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .scan-btn:hover { background: #ff2d50; transform: translateY(-1px); }
  .scan-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Loading */
  .loading {
    display: none;
    align-items: center;
    gap: 12px;
    color: var(--muted);
    font-size: 12px;
    margin-bottom: 24px;
  }

  .loading.active { display: flex; }

  .pulse-dots span {
    display: inline-block;
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    margin: 0 2px;
    animation: pulse 1.2s infinite;
  }

  .pulse-dots span:nth-child(2) { animation-delay: 0.2s; }
  .pulse-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* Results */
  #results { display: none; }
  #results.active { display: block; }

  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .results-title {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .risk-summary {
    display: flex;
    gap: 16px;
  }

  .risk-count {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  .dot.critical { background: var(--danger); }
  .dot.warning { background: var(--warn); }
  .dot.low { background: var(--safe); }

  /* Risk card */
  .risk-card {
    background: var(--surface);
    border: 1px solid var(--border);
    margin-bottom: 16px;
    overflow: hidden;
    animation: slideIn 0.3s ease forwards;
    opacity: 0;
    transform: translateY(8px);
  }

  @keyframes slideIn {
    to { opacity: 1; transform: translateY(0); }
  }

  .risk-card:nth-child(1) { animation-delay: 0.05s; }
  .risk-card:nth-child(2) { animation-delay: 0.1s; }
  .risk-card:nth-child(3) { animation-delay: 0.15s; }
  .risk-card:nth-child(4) { animation-delay: 0.2s; }
  .risk-card:nth-child(5) { animation-delay: 0.25s; }

  .risk-header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 20px;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }

  .risk-header:hover { background: var(--surface2); }

  .severity-tag {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 3px 8px;
    flex-shrink: 0;
    font-family: 'Syne', sans-serif;
  }

  .severity-tag.critical { background: rgba(255,77,109,0.15); color: var(--danger); border: 1px solid rgba(255,77,109,0.3); }
  .severity-tag.warning  { background: rgba(255,209,102,0.15); color: var(--warn);   border: 1px solid rgba(255,209,102,0.3); }
  .severity-tag.low      { background: rgba(6,214,160,0.15);   color: var(--safe);   border: 1px solid rgba(6,214,160,0.3); }

  .risk-title {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    flex: 1;
  }

  .risk-category {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .chevron {
    color: var(--muted);
    font-size: 12px;
    transition: transform 0.2s;
    flex-shrink: 0;
  }

  .risk-card.open .chevron { transform: rotate(180deg); }

  .risk-body {
    display: none;
    padding: 0 20px 20px;
    border-top: 1px solid var(--border);
  }

  .risk-card.open .risk-body { display: block; }

  .risk-body-section {
    margin-top: 16px;
  }

  .risk-body-section h4 {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
  }

  .risk-body-section p, .risk-body-section li {
    font-size: 12px;
    line-height: 1.7;
    color: #c8c8d8;
  }

  .risk-body-section ul {
    list-style: none;
    padding: 0;
  }

  .risk-body-section li::before {
    content: '→ ';
    color: var(--accent);
  }

  .action-list li::before {
    content: '✓ ';
    color: var(--safe);
  }

  .signal-detected {
    background: var(--bg);
    border-left: 2px solid var(--accent);
    padding: 10px 14px;
    font-size: 12px;
    color: #c8c8d8;
    line-height: 1.6;
    font-style: italic;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 48px;
    color: var(--muted);
    font-size: 12px;
    line-height: 2;
  }

  .no-risks {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--safe);
    margin-bottom: 8px;
  }

  .watermark {
    margin-top: 48px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    color: var(--muted);
    font-size: 10px;
    letter-spacing: 1px;
    flex-wrap: wrap;
    gap: 8px;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="badge">PM Risk Radar</div>
    <h1>Detect risks<br><span>before they explode.</span></h1>
    <p class="subtitle">Describe your current project situation. The agent scans for 20+ known delivery,<br>client, and team risk patterns and tells you exactly what to do.</p>
  </header>

  <div class="input-section">
    <textarea id="situationInput" placeholder="e.g. The client verbally agreed to the new feature scope on our last call but nothing was documented. The POC seems less responsive lately and approvals have been delayed for two weeks. The dev team says the task is almost done but it's been that way for a while..."></textarea>
    <div class="input-footer">
      <div class="examples">
        <span style="font-size:10px;color:var(--muted);margin-right:4px;">Try:</span>
        <button class="example-chip" onclick="fillExample('client')">Client going quiet</button>
        <button class="example-chip" onclick="fillExample('scope')">Scope creep</button>
        <button class="example-chip" onclick="fillExample('team')">Team burnout</button>
        <button class="example-chip" onclick="fillExample('delivery')">Delivery stalling</button>
      </div>
      <button class="scan-btn" id="scanBtn" onclick="scanRisks()">⬡ Scan for Risks</button>
    </div>
  </div>

  <div class="loading" id="loading">
    <div class="pulse-dots"><span></span><span></span><span></span></div>
    <span>Agent scanning for risk patterns...</span>
  </div>

  <div id="results">
    <div class="results-header">
      <div class="results-title">Risk Analysis</div>
      <div class="risk-summary" id="riskSummary"></div>
    </div>
    <div id="riskCards"></div>
  </div>

  <div class="watermark">
    <span>PM RISK RADAR — POWERED BY CLAUDE</span>
    <span id="scanTime"></span>
  </div>
</div>

<script>
const examples = {
  client: "The client has been less responsive over the past two weeks. Emails are getting slower replies and they shortened our weekly call. The POC I was working with closely has shifted to a new role inside their company. Approvals for UAT sign-off have been sitting for 10 days now with no movement.",
  scope: "The client keeps adding small requests — a new filter here, an extra report there — and the team has been absorbing them without logging anything. Now we're halfway through Q3 and have delivered a lot of work that wasn't in the original scope. Nobody has raised it formally yet.",
  team: "One of our strongest developers has been picking up the slack for two others and never complains. I noticed their PR quality has slipped a bit this week and they've been slower to respond. Meanwhile a team member flagged a task as 90% done two weeks ago and it's still 90% done.",
  delivery: "We have a dependency on a third-party payment API provider. They've gone quiet — no response in 5 days. Our release is in two weeks and UAT hasn't started because the client says they'll get to it. A developer verbally told me in a standup the task is nearly done but I haven't seen it in code review yet."
};

function fillExample(key) {
  document.getElementById('situationInput').value = examples[key];
}

function toggleCard(el) {
  el.closest('.risk-card').classList.toggle('open');
}

async function scanRisks() {
  const situation = document.getElementById('situationInput').value.trim();
  if (!situation) { 
    document.getElementById('situationInput').focus();
    return; 
  }

  const btn = document.getElementById('scanBtn');
  btn.disabled = true;
  document.getElementById('loading').classList.add('active');
  document.getElementById('results').classList.remove('active');

  const systemPrompt = `You are a senior PM Risk Detection Agent. Your job is to analyze project situations and detect delivery, client, and team risks based on a known taxonomy of 20 common PM failure patterns.

The risk taxonomy (detect any that apply):
CLIENT RISKS:
1. Verbal agreements without documentation (no paper trail)
2. Requirements instability / client going back and forth
3. Single point of contact dependency (key person leaving)
4. Silent client dissatisfaction (tone shift, slower responses, shorter calls)
5. Friendly but non-decisive client (always says yes, nothing moves)
6. Missed upsell/expansion opportunity
7. UAT/approval delays causing delivery stall attributed to vendor

SCOPE & COMMERCIAL RISKS:
8. Scope creep accepted without tracking
9. "Small asks" accumulating into untracked effort
10. No proactive conversation about next phase (losing account to competitor)
11. Out-of-scope work absorbed silently to avoid conflict

DELIVERY RISKS:
12. "90% done" stagnation (vague completion status)
13. Third-party/external dependency with no SLA or escalation path
14. Overly softened bad news causing greater trust damage later
15. Holding a problem too long before escalating to leadership

TEAM RISKS:
16. Silent performance degradation (small drops in quality, ignored)
17. High performer quietly burning out
18. Delayed feedback blindsiding team members in reviews
19. Unclear escalation decision (handle yourself vs loop in leadership)

PROCESS RISKS:
20. Cost control pressure conflicting with scope flexibility
21. Late-stage feedback after early positive signals (big reveal problem)
22. Client process agreement followed by late negative feedback on same process

For each detected risk, respond ONLY with a valid JSON array. No markdown, no explanation outside JSON.

Each item:
{
  "id": "unique_id",
  "title": "Short risk name",
  "category": "CLIENT | SCOPE | DELIVERY | TEAM | PROCESS",
  "severity": "critical | warning | low",
  "signal": "What in the situation triggered this risk detection (quote or paraphrase specific signals)",
  "what_is_happening": "2-3 sentences explaining the risk pattern and why it matters",
  "immediate_actions": ["action 1", "action 2", "action 3"],
  "escalate_if": "The specific condition that should trigger escalation"
}

Severity guide:
- critical: active damage happening now or imminent
- warning: trajectory is bad but correctable in next 1-2 weeks
- low: early signal, monitor and act proactively

Only flag risks that are genuinely present. Do not over-flag. If no risks detected, return [].`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 2000,
        system: systemPrompt,
        messages: [{ role: "user", content: `Analyze this PM situation for risks:\n\n${situation}` }]
      })
    });

    const data = await response.json();
    const raw = data.content.map(b => b.text || '').join('');
    
    let risks = [];
    try {
      const clean = raw.replace(/```json|```/g, '').trim();
      risks = JSON.parse(clean);
    } catch(e) {
      risks = [];
    }

    renderResults(risks);
  } catch(e) {
    renderError();
  }

  btn.disabled = false;
  document.getElementById('loading').classList.remove('active');
}

function renderResults(risks) {
  const container = document.getElementById('riskCards');
  const summary = document.getElementById('riskSummary');
  const results = document.getElementById('results');
  
  document.getElementById('scanTime').textContent = new Date().toLocaleTimeString();

  if (!risks.length) {
    container.innerHTML = `<div class="empty-state"><div class="no-risks">✓ No risks detected</div>Situation looks clean. Keep monitoring and document everything.</div>`;
    summary.innerHTML = '';
    results.classList.add('active');
    return;
  }

  const counts = { critical: 0, warning: 0, low: 0 };
  risks.forEach(r => counts[r.severity] = (counts[r.severity] || 0) + 1);

  summary.innerHTML = ['critical','warning','low']
    .filter(s => counts[s])
    .map(s => `<div class="risk-count"><div class="dot ${s}"></div>${counts[s]} ${s}</div>`)
    .join('');

  risks.sort((a,b) => {
    const order = { critical:0, warning:1, low:2 };
    return order[a.severity] - order[b.severity];
  });

  container.innerHTML = risks.map((r, i) => `
    <div class="risk-card" id="card-${i}">
      <div class="risk-header" onclick="toggleCard(this)">
        <span class="severity-tag ${r.severity}">${r.severity}</span>
        <div>
          <div class="risk-title">${escHtml(r.title)}</div>
          <div class="risk-category">${escHtml(r.category)}</div>
        </div>
        <span class="chevron">▼</span>
      </div>
      <div class="risk-body">
        <div class="risk-body-section">
          <h4>Signal Detected</h4>
          <div class="signal-detected">${escHtml(r.signal)}</div>
        </div>
        <div class="risk-body-section">
          <h4>What's Happening</h4>
          <p>${escHtml(r.what_is_happening)}</p>
        </div>
        <div class="risk-body-section">
          <h4>Immediate Actions</h4>
          <ul class="action-list">${(r.immediate_actions||[]).map(a=>`<li>${escHtml(a)}</li>`).join('')}</ul>
        </div>
        <div class="risk-body-section">
          <h4>Escalate If</h4>
          <ul><li>${escHtml(r.escalate_if)}</li></ul>
        </div>
      </div>
    </div>
  `).join('');

  // auto-open first critical
  const firstCritical = risks.findIndex(r => r.severity === 'critical');
  if (firstCritical >= 0) {
    document.getElementById(`card-${firstCritical}`).classList.add('open');
  }

  results.classList.add('active');
}

function renderError() {
  document.getElementById('riskCards').innerHTML = `<div class="empty-state" style="color:var(--danger)">Failed to connect to the agent. Check your API connection and try again.</div>`;
  document.getElementById('results').classList.add('active');
}

function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// keyboard shortcut
document.getElementById('situationInput').addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') scanRisks();
});
</script>
</body>
</html>
